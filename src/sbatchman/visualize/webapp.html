<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HPC Benchmark Plot Builder</title>
<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.32.0/plotly.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#1c2128; --bg4:#21262d;
  --border:#30363d; --border2:#444c56;
  --text:#e6edf3; --text2:#8b949e; --text3:#6e7681;
  --accent:#00d4d4; --accent2:#58a6ff; --accent3:#3fb950;
  --warn:#f78166; --warn2:#e3b341; --plugin:#bc8cff;
  --radius:6px;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;overflow:hidden}

#app{display:grid;grid-template-columns:260px 1fr;grid-template-rows:46px 1fr;height:100vh}
#topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);
        display:flex;align-items:center;padding:0 14px;gap:12px;z-index:10}
#sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
#centre{display:flex;flex-direction:column;overflow:hidden;position:relative}

#log-panel{position:fixed;top:46px;right:0;bottom:0;width:0;background:var(--bg2);
           border-left:1px solid var(--border);display:flex;flex-direction:column;
           transition:width .2s ease;z-index:20;overflow:hidden}
#log-panel.open{width:340px}
#log-header{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);gap:8px;flex-shrink:0}
#log-header span{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);flex:1}
#log-body{flex:1;overflow-y:auto;padding:6px 0;font-family:var(--mono);font-size:10px}
.log-entry{padding:3px 12px;display:flex;gap:8px;border-bottom:1px solid rgba(48,54,61,.4);line-height:1.4}
.log-ts{color:var(--text3);flex-shrink:0}
.log-msg{color:var(--text2);word-break:break-all}
.log-entry.error .log-msg{color:var(--warn)}
.log-entry.warn  .log-msg{color:var(--warn2)}
.log-entry.info  .log-msg{color:var(--text2)}
.log-entry.script .log-msg,.log-entry.transform .log-msg{color:var(--plugin)}
#log-clear{font-size:10px;padding:2px 8px}

.logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);letter-spacing:-.02em;white-space:nowrap}
.logo span{color:var(--text2);font-weight:400}
.topbar-mid{flex:1;display:flex;align-items:center;gap:6px;overflow-x:auto;padding:0 8px}
.topbar-right{display:flex;gap:6px;flex-shrink:0;align-items:center}
.docs-link{color:var(--text2);font-size:11px;text-decoration:none;padding:4px 9px;border-radius:var(--radius);border:1px solid var(--border2)}
.docs-link:hover{color:var(--accent);border-color:var(--accent)}

#plot-tabs-bar{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);
               padding:0 8px;gap:0;min-height:36px;overflow-x:auto}
.plot-tab{display:flex;align-items:center;gap:6px;padding:6px 14px;border-bottom:2px solid transparent;
          cursor:pointer;font-size:12px;color:var(--text2);white-space:nowrap;transition:all .12s;user-select:none}
.plot-tab:hover{color:var(--text)}
.plot-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.plot-tab-close{opacity:.4;font-size:14px;line-height:1;padding:0 2px}
.plot-tab-close:hover{opacity:1;color:var(--warn)}
#btn-add-tab{padding:4px 10px;font-size:18px;color:var(--text3);cursor:pointer;border:none;background:none;line-height:1}
#btn-add-tab:hover{color:var(--accent)}

#workspaces{flex:1;overflow:hidden;position:relative}
.workspace{display:none;flex-direction:column;height:100%;overflow:hidden}
.workspace.active{display:flex}

/* Figure toolbar (single/grid mode switch) */
.figure-toolbar{display:flex;align-items:center;gap:14px;padding:6px 14px;background:var(--bg3);
  border-bottom:1px solid var(--border);flex-shrink:0;font-size:11px}
.mode-toggle{display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--text2)}
.mode-toggle input{width:auto;cursor:pointer}
.mode-toggle.active-label{color:var(--accent);font-weight:600}
#grid-controls-wrap{display:none;align-items:center;gap:6px}
#grid-controls-wrap input[type=number]{width:44px;padding:3px 5px}
.panel-tabs{display:none;flex-wrap:wrap;gap:4px;padding:6px 14px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0}
.panel-chip{padding:3px 10px;border-radius:10px;border:1px solid var(--border);font-size:10px;color:var(--text2);cursor:pointer}
.panel-chip:hover{color:var(--text)}
.panel-chip.active{border-color:var(--accent2);color:var(--accent2);background:rgba(88,166,255,.1)}

.builder{background:var(--bg2);border-bottom:1px solid var(--border);overflow-y:auto;max-height:56%;flex-shrink:0}
.builder-inner{display:none;gap:0;flex-wrap:wrap}
.builder-inner.active{display:flex}

.b-col{padding:10px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:7px;min-width:180px}
.b-col:last-child{border-right:none;flex:1}
.b-col-title{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:2px}

.plot-type-grid{display:flex;flex-wrap:wrap;gap:4px}
.plot-chip{padding:3px 9px;border-radius:12px;border:1px solid var(--border);background:transparent;
           color:var(--text2);font-size:10px;cursor:pointer;transition:all .12s;font-family:var(--sans)}
.plot-chip:hover{border-color:var(--accent);color:var(--accent)}
.plot-chip.active{border-color:var(--accent);background:rgba(0,212,212,.12);color:var(--accent);font-weight:500}
.plot-chip.plugin{border-style:dashed;color:var(--plugin);border-color:var(--plugin)}
.plot-chip.plugin.active{background:rgba(188,140,255,.12)}

label{font-size:10px;color:var(--text2);display:block;margin-bottom:3px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 7px;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
select option{background:var(--bg3)}
textarea{resize:vertical}

.multi-col-list{display:flex;flex-wrap:wrap;gap:3px;min-height:28px;max-height:72px;overflow-y:auto;
  padding:4px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius)}
.col-pill{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:10px;
  font-size:9px;font-family:var(--mono);cursor:pointer;border:1px solid var(--border);
  background:var(--bg4);color:var(--text2);transition:all .1s}
.col-pill:hover{border-color:var(--accent2);color:var(--accent2)}
.col-pill.selected{background:rgba(88,166,255,.15);border-color:var(--accent2);color:var(--accent2)}

.script-toggle{display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--text2);
  font-size:10px;padding:4px 0;user-select:none}
.script-toggle:hover{color:var(--accent)}
.script-box{display:none}
.script-box.open{display:block}
.script-hint{font-size:9px;color:var(--text3);margin-bottom:4px;font-family:var(--mono);line-height:1.5}
.script-hint b{color:var(--accent)}
.script-hint code{color:var(--accent2)}
.script-examples{font-size:9px;color:var(--text3);margin-top:4px;font-family:var(--mono);
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;line-height:1.6}
.script-examples b{color:var(--text2);display:block;margin-bottom:2px;font-family:var(--sans);font-size:9px;text-transform:uppercase;letter-spacing:.06em}

.extra-opts{display:flex;flex-wrap:wrap;gap:6px}
.extra-opts>div{flex:1;min-width:90px}

.plot-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.plotly-wrap{flex:1;min-height:0;position:relative;background:#fff}
.plotly-div{width:100%;height:100%}
.plot-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;color:var(--text3);font-size:12px;pointer-events:none;background:var(--bg)}
.overlay-icon{font-size:36px;opacity:.25}
.statusbar{padding:5px 14px;font-size:10px;background:var(--bg2);border-top:1px solid var(--border);
  font-family:var(--mono);display:flex;gap:14px;align-items:center;flex-shrink:0}
.s-ok{color:var(--accent3)} .s-err{color:var(--warn)} .s-warn{color:var(--warn2)}

.data-preview{display:none;max-height:220px;overflow:auto;border-top:1px solid var(--border);
  background:var(--bg2);flex-shrink:0}
.data-preview.open{display:block}
.preview-section-label{font-size:9px;color:var(--text3);padding:5px 10px;background:var(--bg3);
  text-transform:uppercase;letter-spacing:.06em;position:sticky;top:0}
table.data-table{border-collapse:collapse;font-family:var(--mono);font-size:10px;width:100%}
table.data-table th{position:sticky;top:0;background:var(--bg4);color:var(--accent2);text-align:left;
  padding:4px 8px;border-bottom:1px solid var(--border2);white-space:nowrap}
table.data-table td{padding:3px 8px;border-bottom:1px solid rgba(48,54,61,.4);color:var(--text2);white-space:nowrap}
table.data-table tr:hover td{background:var(--bg3)}

.btn{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:var(--radius);
  border:1px solid var(--border2);background:transparent;color:var(--text);font-size:11px;
  font-family:var(--sans);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,212,.07)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.btn.primary:hover{background:#00b8b8}
.btn.sm{padding:3px 8px;font-size:10px}
.btn:disabled{opacity:.35;pointer-events:none}

.sb-tabs{display:flex;border-bottom:1px solid var(--border)}
.sb-tab{flex:1;padding:7px;text-align:center;font-size:10px;cursor:pointer;color:var(--text2);
  border-bottom:2px solid transparent;transition:all .12s}
.sb-tab:hover{color:var(--text)}
.sb-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sb-pane{display:none;flex-direction:column;overflow-y:auto}
.sb-pane.active{display:flex}
.sb-section{border-bottom:1px solid var(--border)}
.sb-section-hdr{padding:8px 12px 6px;font-size:9px;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text3);display:flex;align-items:center;justify-content:space-between}
.sb-section-body{padding:0 12px 10px}

.db-item{margin-bottom:4px}
.db-name{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--accent2);padding:3px 0;
  cursor:pointer;display:flex;align-items:center;gap:4px}
.db-name:hover{color:var(--accent)}
.table-list{margin-left:10px}
.table-list.flat{margin-left:0}
.table-item{display:flex;align-items:center;gap:5px;padding:2px 4px;border-radius:4px;cursor:pointer;
  color:var(--text2);font-family:var(--mono);font-size:10px;transition:all .12s}
.table-item:hover{background:var(--bg4);color:var(--text)}
.table-cols{margin-left:18px;margin-top:1px}
.col-item{font-family:var(--mono);font-size:9px;color:var(--text3);padding:1px 0;display:flex;align-items:center;gap:3px}
.col-type{color:var(--warn2);font-size:8px}
.badge{font-size:8px;padding:1px 4px;border-radius:3px;background:var(--bg4);color:var(--text3);font-family:var(--mono)}

.action-btn{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:10px;
  cursor:pointer;transition:all .12s;width:100%;text-align:left;margin-bottom:5px;font-family:var(--sans)}
.action-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,212,.05)}
.action-btn svg{flex-shrink:0;opacity:.6}
.fetch-system-sel{margin-bottom:6px}
.fetch-path-list{max-height:120px;overflow-y:auto;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:4px}
.fetch-path-item{display:flex;align-items:center;gap:5px;padding:2px 4px;font-family:var(--mono);
  font-size:9px;color:var(--text2);border-radius:3px;cursor:pointer}
.fetch-path-item:hover{background:var(--bg4)}
.fetch-path-item input{width:auto;flex-shrink:0;height:12px;width:12px;padding:0;cursor:pointer}
#fetch-run-btn{margin-top:6px;width:100%}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);padding:4px 9px;
  border-radius:var(--radius);font-size:10px;white-space:nowrap;z-index:200;pointer-events:none;
  color:var(--text);font-family:var(--sans);box-shadow:0 4px 12px rgba(0,0,0,.4)}

#btn-log-toggle{position:relative}
.log-badge{position:absolute;top:-4px;right:-4px;background:var(--warn);color:#000;
  border-radius:8px;font-size:8px;padding:1px 4px;font-weight:700;min-width:14px;text-align:center}

@keyframes flash{0%,100%{opacity:1}50%{opacity:.3}}
.flash{animation:flash .4s}
</style>
</head>
<body>
<div id="app">

<div id="topbar">
  <div class="logo"><span>SbatchMan</span>.plot</div>

  <div class="topbar-mid">
    <button class="btn primary" id="btn-run" data-tip="Render the active plot / figure (Ctrl+Enter)">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l10 6-10 6V2z"/></svg>Run
    </button>
    <button class="btn" id="btn-export-config" data-tip="Export active tab config as JSON">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3M2 12v2h12v-2"/></svg>Export config
    </button>
    <button class="btn" id="btn-import-config" data-tip="Import a JSON config into the active tab">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 11V3M5 6l3-3 3 3M2 12v2h12v-2"/></svg>Import config
    </button>
    <button class="btn" id="btn-export-all" data-tip="Export ALL tabs as one workspace JSON (save it as plots.json in the server's working directory to auto-load it next launch)">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="10" height="12" rx="1"/><path d="M5 2v12M12 6h2v8H5"/></svg>Export workspace
    </button>
    <button class="btn" id="btn-import-all" data-tip="Import a workspace JSON (replaces all tabs)">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="10" height="12" rx="1"/><path d="M5 2v12M14 6h-2V2"/></svg>Import workspace
    </button>
    <button class="btn" id="btn-export-png" data-tip="Save active figure as PNG (1600×900)">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M2 10l3-3 3 3 2-2 4 4"/></svg>Save PNG
    </button>
  </div>

  <div class="topbar-right">
    <a class="docs-link" href="/docs" target="_blank" rel="noopener">Docs</a>
    <button class="btn" id="btn-log-toggle" data-tip="Toggle log panel">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M5 6h6M5 9h4"/></svg>
      Logs<span class="log-badge" id="log-badge" style="display:none">0</span>
    </button>
  </div>
</div>

<div id="sidebar">
  <div class="sb-tabs">
    <div class="sb-tab active" data-sbtab="schema">Schema</div>
    <div class="sb-tab" data-sbtab="actions">Actions</div>
  </div>

  <div id="sbtab-schema" class="sb-pane active">
    <div class="sb-section">
      <div class="sb-section-hdr"><span id="schema-hdr-label">Databases</span> <span id="db-count" class="badge">0</span></div>
      <div class="sb-section-body" id="schema-tree">Loading…</div>
    </div>
  </div>

  <div id="sbtab-actions" class="sb-pane">
    <div class="sb-section">
      <div class="sb-section-hdr" data-tip="Re-run the parser and refresh schema — new columns/tables now show up without restarting the server">Re-parse data</div>
      <div class="sb-section-body">
        <div style="margin-bottom:6px" id="reparse-db-wrap">
          <label>Database</label>
          <select id="reparse-db-sel"></select>
        </div>
        <button class="action-btn" id="btn-reparse" data-tip="Calls hook_reparse() — customise in the Python backend">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8a6 6 0 1 0 1-3.5"/><path d="M2 2v4h4"/></svg>
          Re-parse selected DB
        </button>
        <div id="reparse-result" style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px"></div>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-section-hdr" data-tip="Fetch remote SQLite files — configure systems in REMOTE_SYSTEMS dict in the Python backend">Fetch from remote</div>
      <div class="sb-section-body">
        <div class="fetch-system-sel">
          <label>System</label>
          <select id="fetch-system-sel" onchange="onFetchSystemChange()"></select>
        </div>
        <label data-tip="Check paths you want to pull; uncheck to skip">Paths (select to fetch)</label>
        <div class="fetch-path-list" id="fetch-path-list"><span style="color:var(--text3);font-size:9px">Select a system</span></div>
        <button class="btn sm" id="fetch-run-btn" onclick="runFetch()" data-tip="Calls hook_fetch_remote() — customise in the Python backend">
          <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 11V3M5 6l3-3 3 3M2 12v2h12v-2"/></svg>
          Fetch selected
        </button>
        <div id="fetch-result" style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px"></div>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-section-hdr" data-tip="Python plugin files that define custom plot types">Plugins</div>
      <div class="sb-section-body">
        <button class="action-btn" id="btn-reload-plugins" data-tip="Reload all plugin .py files from disk without restarting the server">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8a6 6 0 1 0 1-3.5"/><path d="M2 2v4h4"/></svg>
          Reload plugins
        </button>
        <div id="plugin-list" style="font-size:9px;color:var(--text3);font-family:var(--mono)"></div>
      </div>
    </div>
  </div>
</div>

<div id="centre">
  <div id="plot-tabs-bar">
    <button id="btn-add-tab" data-tip="Add a new plot tab (clones the active one)">＋</button>
  </div>
  <div id="workspaces"></div>
</div>

<div id="log-panel">
  <div id="log-header">
    <span>Logs</span>
    <button class="btn sm" id="log-clear">Clear</button>
    <button class="btn sm" id="log-close">✕</button>
  </div>
  <div id="log-body"></div>
</div>

<input type="file" id="import-file-input"    accept=".json" style="display:none">
<input type="file" id="import-ws-file-input" accept=".json" style="display:none">

<script>
// ═══════════════════════════════════════════════════════════════
// Global state
// ═══════════════════════════════════════════════════════════════
const G = {
  databases:  {},
  plotTypes:  {},
  remoteSystems: {},
  tabs:       [],     // top-level tabs: [{id, label, state}]
  panelState: {},     // panelId -> state (same shape as tab.state), for grid-mode sub-panels
  activeTab:  null,
  nextTabId:  1,
  nextPanelSeq: {},   // tabId -> next panel sequence number
  logCount:   0,
  singleDb:   false,
  defaultDb:  '',
};

// ═══════════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

function clientLog(msg, level='info') {
  addLogEntry({ts: new Date().toLocaleTimeString('en',{hour12:false}), level, msg});
  api('POST', '/api/log', {message: msg, level});
}

// ═══════════════════════════════════════════════════════════════
// Log panel
// ═══════════════════════════════════════════════════════════════
function addLogEntry(e) {
  const body = document.getElementById('log-body');
  const div = document.createElement('div');
  div.className = `log-entry ${e.level}`;
  div.innerHTML = `<span class="log-ts">${e.ts}</span><span class="log-msg">${escHtml(e.msg)}</span>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
  G.logCount++;
  const badge = document.getElementById('log-badge');
  const panel = document.getElementById('log-panel');
  if (!panel.classList.contains('open')) {
    badge.textContent = G.logCount;
    badge.style.display = 'block';
  }
}
function addLogEntries(entries) { (entries || []).forEach(e => addLogEntry(e)); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('btn-log-toggle').addEventListener('click', () => {
  const p = document.getElementById('log-panel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) { G.logCount = 0; document.getElementById('log-badge').style.display = 'none'; }
});
document.getElementById('log-close').addEventListener('click', () => document.getElementById('log-panel').classList.remove('open'));
document.getElementById('log-clear').addEventListener('click', () => {
  document.getElementById('log-body').innerHTML = '';
  G.logCount = 0;
  document.getElementById('log-badge').style.display = 'none';
});
async function fetchServerLogs() {
  const res = await api('GET', '/api/logs');
  (res.logs || []).forEach(e => addLogEntry(e));
}

// ═══════════════════════════════════════════════════════════════
// Generic node-state access (a "node" is either a top-level tab or a
// grid sub-panel — both share the exact same state shape)
// ═══════════════════════════════════════════════════════════════
function getState(id) {
  const tab = G.tabs.find(t => t.id === id);
  if (tab) return tab.state;
  return G.panelState[id];
}
function tabEl(id, suffix) { return document.getElementById(`${suffix}-${id}`); }
function currentDb(id) { return G.singleDb ? G.defaultDb : (tabEl(id, 'db-select')?.value); }

function defaultNodeState(base) {
  return Object.assign({
    database: G.defaultDb || Object.keys(G.databases)[0] || '',
    sql: '', plotType: 'line', columns: [], yCols: [], groupCols: [],
    x:'', markerBy:'', dashBy:'', z:'', extra:{},
    chartTitle:'', xLabel:'', yLabel:'', xScale:'linear', yScale:'linear',
    xTickFmt:'', yTickFmt:'', customScript:'', transformScript:'', layoutScript:'',
  }, base || {});
}

// ═══════════════════════════════════════════════════════════════
// Data preview table (shared renderer)
// ═══════════════════════════════════════════════════════════════
function renderDataTable(container, dfData, emptyMsg) {
  if (!dfData || !dfData.columns || !dfData.columns.length) {
    container.innerHTML = `<span style="color:var(--text3);font-size:10px;padding:8px;display:block">${emptyMsg || 'No data yet'}</span>`;
    return;
  }
  let html = '<table class="data-table"><thead><tr>';
  dfData.columns.forEach(c => html += `<th>${escHtml(c)}</th>`);
  html += '</tr></thead><tbody>';
  for (const row of dfData.rows) {
    html += '<tr>' + row.map(v => `<td>${v===null||v===undefined ? '' : escHtml(v)}</td>`).join('') + '</tr>';
  }
  html += '</tbody></table>';
  if (dfData.truncated) html += `<div style="font-size:9px;color:var(--text3);padding:4px 8px">Preview truncated — showing first ${dfData.rows.length} row(s)</div>`;
  container.innerHTML = html;
}
function renderMultiPreview(container, labeledTables) {
  container.innerHTML = '';
  labeledTables.forEach(({label, df}) => {
    const lbl = document.createElement('div');
    lbl.className = 'preview-section-label';
    lbl.textContent = label;
    container.appendChild(lbl);
    const box = document.createElement('div');
    renderDataTable(box, df);
    container.appendChild(box);
  });
}

// ═══════════════════════════════════════════════════════════════
// Schema tree
// ═══════════════════════════════════════════════════════════════
function renderTableList(container, dbName, tables) {
  for (const [tname, cols] of Object.entries(tables || {})) {
    const ti = document.createElement('div');
    ti.className = 'table-item';
    ti.innerHTML = `<svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="1"/><line x1="1" y1="5.5" x2="15" y2="5.5"/><line x1="6" y1="5.5" x2="6" y2="15"/></svg> ${tname} <span class="badge">${cols.length}</span>`;
    let colsOpen = false;
    const colsDiv = document.createElement('div');
    colsDiv.className = 'table-cols';
    colsDiv.style.display = 'none';
    cols.forEach(c => {
      const ci = document.createElement('div');
      ci.className = 'col-item';
      ci.innerHTML = `▸ ${c.name} <span class="col-type">${c.type}</span>`;
      colsDiv.appendChild(ci);
    });
    ti.addEventListener('click', e => {
      e.stopPropagation();
      colsOpen = !colsOpen;
      colsDiv.style.display = colsOpen ? 'block' : 'none';
      const id = activeBuilderId();
      if (id) {
        const sel = tabEl(id, 'db-select');
        if (sel) sel.value = dbName;
        const st = getState(id);
        if (st) st.database = dbName;
        const sql = tabEl(id, 'sql-input');
        if (sql && !sql.value.trim()) sql.value = `SELECT * FROM ${tname}`;
      }
    });
    container.appendChild(ti);
    container.appendChild(colsDiv);
  }
}

function renderSchemaTree() {
  const el = document.getElementById('schema-tree');
  const hdr = document.getElementById('schema-hdr-label');
  const dbs = G.databases;
  const names = Object.keys(dbs);
  document.getElementById('db-count').textContent = names.length;
  if (!names.length) { el.innerHTML = '<span style="color:var(--text3)">No databases loaded</span>'; return; }
  el.innerHTML = '';

  if (G.singleDb) {
    hdr.textContent = 'Tables';
    const flat = document.createElement('div');
    flat.className = 'table-list flat';
    renderTableList(flat, names[0], dbs[names[0]]);
    el.appendChild(flat);
    return;
  }

  hdr.textContent = 'Databases';
  for (const [dbName, tables] of Object.entries(dbs)) {
    const dbDiv = document.createElement('div');
    dbDiv.className = 'db-item';
    const nameEl = document.createElement('div');
    nameEl.className = 'db-name';
    nameEl.innerHTML = `<svg width="9" height="9" viewBox="0 0 16 16" fill="currentColor"><ellipse cx="8" cy="4" rx="6" ry="2.5"/><path d="M2 4v4c0 1.38 2.69 2.5 6 2.5S14 9.38 14 8V4"/><path d="M2 8v4c0 1.38 2.69 2.5 6 2.5S14 13.38 14 12V8"/></svg> ${dbName}`;
    let open = false;
    const tableList = document.createElement('div');
    tableList.className = 'table-list';
    tableList.style.display = 'none';
    renderTableList(tableList, dbName, tables);
    nameEl.addEventListener('click', () => { open = !open; tableList.style.display = open ? 'block' : 'none'; });
    dbDiv.appendChild(nameEl); dbDiv.appendChild(tableList);
    el.appendChild(dbDiv);
  }
}

// ═══════════════════════════════════════════════════════════════
// "Which builder is currently visible" — used by the schema tree click
// handler above to know which x/sql fields to fill in.
// ═══════════════════════════════════════════════════════════════
function activeBuilderId() {
  const tab = activeTabObj();
  if (!tab) return null;
  if (tab.state.mode === 'grid') return tab.state.grid?.activePanel || null;
  return tab.id;
}

// ═══════════════════════════════════════════════════════════════
// Plot type chips / extra options (generic over any node id)
// ═══════════════════════════════════════════════════════════════
function renderPlotChips(id) {
  const wrap = document.getElementById(`chips-${id}`);
  if (!wrap) return;
  wrap.innerHTML = '';
  const st = getState(id);
  if (!st) return;
  for (const [key, pt] of Object.entries(G.plotTypes)) {
    const ch = document.createElement('div');
    ch.className = 'plot-chip' + (pt.is_plugin ? ' plugin' : '') + (key === st.plotType ? ' active' : '');
    ch.textContent = pt.label;
    ch.title = pt.description;
    ch.dataset.type = key;
    ch.addEventListener('click', () => {
      st.plotType = key;
      wrap.querySelectorAll('.plot-chip').forEach(c => c.classList.toggle('active', c.dataset.type === key));
      renderExtraOpts(id);
    });
    wrap.appendChild(ch);
  }
}

function renderExtraOpts(id) {
  const st = getState(id);
  const area = document.getElementById(`extra-opts-${id}`);
  if (!st || !area) return;
  area.innerHTML = '';
  const pt = G.plotTypes[st.plotType];
  if (!pt) return;
  for (const [key, val] of Object.entries(pt.defaults || {})) {
    const wrap = document.createElement('div');
    const lbl = document.createElement('label'); lbl.textContent = key;
    const inp = document.createElement('input');
    inp.id = `extra-${id}-${key}`;
    inp.value = st.extra?.[key] ?? val;
    inp.type = typeof val === 'number' ? 'number' : 'text';
    wrap.appendChild(lbl); wrap.appendChild(inp);
    area.appendChild(wrap);
  }
}

// ═══════════════════════════════════════════════════════════════
// Axis / column controls (generic over any node id)
// ═══════════════════════════════════════════════════════════════
function updateAxisControls(id, columns) {
  const st = getState(id);
  if (!st) return;
  st.columns = columns;
  st.yCols = (st.yCols || []).filter(c => columns.includes(c));
  st.groupCols = (st.groupCols || []).filter(c => columns.includes(c));

  const xSel   = tabEl(id, 'x-col');
  const zSel   = tabEl(id, 'z-col');
  const markerSel = tabEl(id, 'marker-by');
  const dashSel   = tabEl(id, 'dash-by');
  const yPills  = document.getElementById(`y-pills-${id}`);
  const grpPills = document.getElementById(`group-pills-${id}`);
  if (!xSel || !yPills) return;

  const prevX = xSel.value, prevZ = zSel?.value, prevMarker = markerSel?.value, prevDash = dashSel?.value;
  const mkOpt = (v, sel) => { const o = document.createElement('option'); o.value=v; o.textContent=v; if(v===sel)o.selected=true; return o; };

  xSel.innerHTML = '<option value="">— x column —</option>';
  if (zSel) zSel.innerHTML = '<option value="">— none —</option>';
  if (markerSel) markerSel.innerHTML = '<option value="">— none —</option>';
  if (dashSel) dashSel.innerHTML = '<option value="">— none —</option>';
  yPills.innerHTML = '';
  if (grpPills) grpPills.innerHTML = '';

  for (const col of columns) {
    xSel.appendChild(mkOpt(col, prevX || st.x));
    if (zSel) zSel.appendChild(mkOpt(col, prevZ || st.z));
    if (markerSel) markerSel.appendChild(mkOpt(col, prevMarker || st.markerBy));
    if (dashSel) dashSel.appendChild(mkOpt(col, prevDash || st.dashBy));

    const yPill = document.createElement('div');
    yPill.className = 'col-pill' + (st.yCols.includes(col) ? ' selected' : '');
    yPill.textContent = col; yPill.dataset.col = col;
    yPill.addEventListener('click', () => {
      if (st.yCols.includes(col)) { st.yCols = st.yCols.filter(c => c !== col); yPill.classList.remove('selected'); }
      else { st.yCols.push(col); yPill.classList.add('selected'); }
    });
    yPills.appendChild(yPill);

    if (grpPills) {
      const gPill = document.createElement('div');
      gPill.className = 'col-pill' + (st.groupCols.includes(col) ? ' selected' : '');
      gPill.textContent = col; gPill.dataset.col = col;
      gPill.addEventListener('click', () => {
        if (st.groupCols.includes(col)) { st.groupCols = st.groupCols.filter(c => c !== col); gPill.classList.remove('selected'); }
        else { st.groupCols.push(col); gPill.classList.add('selected'); }
      });
      grpPills.appendChild(gPill);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// Wire up a single builder's controls (shared by tabs and panels)
// ═══════════════════════════════════════════════════════════════
function wireBuilderColumns(id) {
  const st = getState(id);
  if (!st) return;

  renderPlotChips(id);
  renderExtraOpts(id);

  const f = (sid, val) => { const el = document.getElementById(sid); if (el && val !== undefined) el.value = val; };
  f(`db-select-${id}`, st.database);
  f(`sql-input-${id}`, st.sql);
  f(`chart-title-${id}`, st.chartTitle);
  f(`x-label-${id}`, st.xLabel);
  f(`y-label-${id}`, st.yLabel);
  f(`x-scale-${id}`, st.xScale);
  f(`y-scale-${id}`, st.yScale);
  f(`x-tickfmt-${id}`, st.xTickFmt);
  f(`y-tickfmt-${id}`, st.yTickFmt);
  f(`script-${id}`, st.customScript);
  f(`transform-${id}`, st.transformScript);
  f(`layout-script-${id}`, st.layoutScript);

  const dbWrap = document.getElementById(`db-select-wrap-${id}`);
  if (dbWrap) dbWrap.style.display = G.singleDb ? 'none' : 'block';
  if (G.singleDb && G.defaultDb) {
    const sel = tabEl(id, 'db-select');
    if (sel) sel.value = G.defaultDb;
    st.database = G.defaultDb;
  }

  if (st.columns && st.columns.length) updateAxisControls(id, st.columns);
  setTimeout(() => { f(`marker-by-${id}`, st.markerBy); f(`dash-by-${id}`, st.dashBy); }, 0);

  const bindToggle = (toggleId, boxId, arrowId) => {
    const t = document.getElementById(toggleId);
    if (!t) return;
    t.addEventListener('click', () => {
      const box = document.getElementById(boxId);
      const arrow = document.getElementById(arrowId);
      const open = box.classList.toggle('open');
      if (arrow) arrow.style.transform = open ? 'rotate(180deg)' : '';
    });
  };
  bindToggle(`script-toggle-${id}`, `script-box-${id}`, `script-arrow-${id}`);
  bindToggle(`transform-toggle-${id}`, `transform-box-${id}`, `transform-arrow-${id}`);
  bindToggle(`layout-toggle-${id}`, `layout-box-${id}`, `layout-arrow-${id}`);

  const runShowBtn = document.getElementById(`run-show-${id}`);
  if (runShowBtn) runShowBtn.addEventListener('click', () => runShow(id));
  const sqlBox = document.getElementById(`sql-input-${id}`);
  if (sqlBox) sqlBox.addEventListener('blur', () => { if (sqlBox.value.trim()) runShow(id); });
}

// ═══════════════════════════════════════════════════════════════
// Run & show (SQL + transform preview) — the single entry point that
// replaces the old separate "load columns" / "test transform" buttons
// ═══════════════════════════════════════════════════════════════
async function runShow(id) {
  const db = currentDb(id);
  const sql = tabEl(id, 'sql-input')?.value.trim();
  const transformScript = tabEl(id, 'transform')?.value || '';
  const statusEl = document.getElementById(`preview-status-${id}`);
  const previewEl = document.getElementById(`inline-preview-${id}`);
  if (!db || !sql) { if (statusEl) statusEl.textContent = 'Set a database and SQL query first'; return; }
  if (statusEl) statusEl.textContent = 'Running…';
  if (previewEl) previewEl.classList.add('open');
  try {
    const res = await api('POST', '/api/preview', {database: db, sql, transform_script: transformScript});
    addLogEntries(res.log_entries);
    if (!res.ok) {
      if (statusEl) statusEl.textContent = res.error || 'Failed';
      if (previewEl) renderDataTable(previewEl, null, 'Query/transform failed — see Logs');
      return;
    }
    updateAxisControls(id, res.columns);
    if (statusEl) statusEl.textContent = `OK — ${res.preview.rows.length} row(s), ${res.columns.length} column(s)`;
    if (previewEl) renderDataTable(previewEl, res.preview);
    clientLog(`Run & show: ${res.preview.rows.length} row(s)`);
  } catch (e) {
    if (statusEl) statusEl.textContent = e.message;
    clientLog(e.message, 'error');
  }
}

// ═══════════════════════════════════════════════════════════════
// Tab management
// ═══════════════════════════════════════════════════════════════
function createTab(label, stateOverride) {
  const id = G.nextTabId++;
  const state = defaultNodeState(stateOverride);
  if (!state.mode) state.mode = 'single';
  const tab = {id, label: label || `Plot ${id}`, state};
  G.tabs.push(tab);
  G.nextPanelSeq[id] = 1;

  const bar = document.getElementById('plot-tabs-bar');
  const btn = document.createElement('div');
  btn.className = 'plot-tab';
  btn.id = `tabbtn-${id}`;
  btn.innerHTML = `<span class="tab-label" ondblclick="renameTab(${id})">${escHtml(tab.label)}</span><span class="plot-tab-close" onclick="closeTab(${id},event)">×</span>`;
  btn.addEventListener('click', () => activateTab(id));
  bar.insertBefore(btn, document.getElementById('btn-add-tab'));

  const ws = document.createElement('div');
  ws.className = 'workspace';
  ws.id = `ws-${id}`;
  ws.innerHTML = workspaceHTML(id);
  document.getElementById('workspaces').appendChild(ws);

  wireWorkspace(id);
  activateTab(id);
  return id;
}

function workspaceHTML(id) {
  return `
<div class="figure-toolbar">
  <label class="mode-toggle" id="mode-label-single-${id}">
    <input type="radio" name="mode-${id}" value="single" checked> Single plot
  </label>
  <label class="mode-toggle" id="mode-label-grid-${id}">
    <input type="radio" name="mode-${id}" value="grid"> Subplot grid
  </label>
  <span id="grid-controls-wrap-${id}">
     rows <input type="number" id="grid-rows-${id}" min="1" max="6" value="1">
     cols <input type="number" id="grid-cols-${id}" min="1" max="6" value="1">
     <button class="btn sm" id="grid-apply-${id}">Apply grid</button>
  </span>
</div>
<div class="panel-tabs" id="panel-tabs-${id}"></div>
<div class="builder" id="builder-wrap-${id}">
  <div class="builder-inner active" id="builder-inner-${id}">${builderColumnsHTML(id)}</div>
</div>

<div class="plot-area">
  <div class="plotly-wrap">
    <div class="plotly-div" id="plot-${id}"></div>
    <div class="plot-overlay" id="overlay-${id}">
      <div class="overlay-icon">⬡</div>
      <div>Write a SQL query, configure axes, then click <strong>Run</strong></div>
    </div>
  </div>
  <div class="data-preview" id="preview-${id}"></div>
  <div class="statusbar">
    <span id="status-${id}" class="s-ok">Ready</span>

    <span id="status-rows-${id}" style="margin-left:auto;color:var(--text3)"></span>

function wireWorkspace(id) {
  wireBuilderColumns(id);

  document.getElementById(`preview-toggle-${id}`).addEventListener('click', () => {
    const pv = document.getElementById(`preview-${id}`);
    const open = pv.classList.toggle('open');
    document.getElementById(`preview-toggle-${id}`).textContent = open ? 'Data ▴' : 'Data ▾';
  });

  // Single / grid mode toggle
  const radios = document.getElementsByName(`mode-${id}`);
  radios.forEach(r => r.addEventListener('change', () => setFigureMode(id, r.value)));
  document.getElementById(`grid-apply-${id}`).addEventListener('click', () => applyGrid(id));
}

function tabEl2(id, suffix) { return document.getElementById(`${suffix}-${id}`); }

function activateTab(id) {
  G.activeTab = id;
  document.querySelectorAll('.plot-tab').forEach(b => b.classList.toggle('active', b.id === `tabbtn-${id}`));
  document.querySelectorAll('.workspace').forEach(w => w.classList.toggle('active', w.id === `ws-${id}`));
}

function closeTab(id, ev) {
  ev?.stopPropagation();
  if (G.tabs.length <= 1) return;
  G.tabs = G.tabs.filter(t => t.id !== id);
  document.getElementById(`tabbtn-${id}`)?.remove();
  document.getElementById(`ws-${id}`)?.remove();
  if (G.activeTab === id) activateTab(G.tabs[G.tabs.length - 1].id);
}

function renameTab(id) {
  const tab = G.tabs.find(t => t.id === id);
  if (!tab) return;
  const label = prompt('Rename tab:', tab.label);
  if (label && label.trim()) {
    tab.label = label.trim();
    const el = document.querySelector(`#tabbtn-${id} .tab-label`);
    if (el) el.textContent = tab.label;
  }
}

function activeTabObj() { return G.tabs.find(t => t.id === G.activeTab); }

document.getElementById('btn-add-tab').addEventListener('click', () => {
  const src = activeTabObj();
  const baseState = src ? JSON.parse(JSON.stringify(src.state)) : {};
  baseState.mode = 'single'; baseState.grid = undefined;
  const newId = createTab(`Plot ${G.nextTabId}`, baseState);
  clientLog(`New tab created (cloned from "${src?.label}")`);
});

// ═══════════════════════════════════════════════════════════════
// Subplot grid mode
// ═══════════════════════════════════════════════════════════════
function setFigureMode(tabId, mode) {
  const tab = G.tabs.find(t => t.id === tabId);
  if (!tab) return;
  tab.state.mode = mode;
  document.getElementById(`grid-controls-wrap-${tabId}`).style.display = mode === 'grid' ? 'inline-flex' : 'none';
  document.getElementById(`panel-tabs-${tabId}`).style.display = mode === 'grid' ? 'flex' : 'none';
  if (mode === 'grid') {
    if (!tab.state.grid) tab.state.grid = {rows: 1, cols: 1, panelIds: [], activePanel: null};
    document.getElementById(`grid-rows-${tabId}`).value = tab.state.grid.rows;
    document.getElementById(`grid-cols-${tabId}`).value = tab.state.grid.cols;
    if (!tab.state.grid.panelIds.length) applyGrid(tabId);
    else showBuilderFor(tabId, tab.state.grid.activePanel || tab.state.grid.panelIds[0]);
  } else {
    showBuilderFor(tabId, tabId);
  }
}

function showBuilderFor(tabId, nodeId) {
  document.querySelectorAll(`#builder-wrap-${tabId} .builder-inner`).forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`builder-inner-${nodeId}`);
  if (el) el.classList.add('active');
  const tab = G.tabs.find(t => t.id === tabId);
  if (tab && tab.state.grid) tab.state.grid.activePanel = nodeId;
  document.querySelectorAll(`#panel-tabs-${tabId} .panel-chip`).forEach(c => c.classList.toggle('active', c.dataset.node === String(nodeId)));
}

function applyGrid(tabId) {
  const tab = G.tabs.find(t => t.id === tabId);
  if (!tab) return;
  const rows = Math.max(1, parseInt(document.getElementById(`grid-rows-${tabId}`).value) || 1);
  const cols = Math.max(1, parseInt(document.getElementById(`grid-cols-${tabId}`).value) || 1);
  const needed = rows * cols;
  if (!tab.state.grid) tab.state.grid = {rows, cols, panelIds: [], activePanel: null};
  tab.state.grid.rows = rows; tab.state.grid.cols = cols;

  let ids = tab.state.grid.panelIds;
  // Add panels if we need more
  while (ids.length < needed) {
    const seq = G.nextPanelSeq[tabId]++;
    const pid = `${tabId}_p${seq}`;
    G.panelState[pid] = defaultNodeState({database: tab.state.database});
    const wrap = document.getElementById(`builder-wrap-${tabId}`);
    const div = document.createElement('div');
    div.className = 'builder-inner';
    div.id = `builder-inner-${pid}`;
    div.innerHTML = builderColumnsHTML(pid);
    wrap.appendChild(div);
    wireBuilderColumns(pid);
    ids.push(pid);
  }
  // Remove panels if we need fewer
  while (ids.length > needed) {
    const pid = ids.pop();
    document.getElementById(`builder-inner-${pid}`)?.remove();
    delete G.panelState[pid];
  }

  renderPanelTabs(tabId);
  showBuilderFor(tabId, ids[0]);
  clientLog(`Grid set to ${rows}×${cols} (${needed} panel(s)) for tab "${tab.label}"`);
}

function renderPanelTabs(tabId) {
  const wrap = document.getElementById(`panel-tabs-${tabId}`);
  const tab = G.tabs.find(t => t.id === tabId);
  wrap.innerHTML = '';
  (tab.state.grid.panelIds || []).forEach((pid, i) => {
    const chip = document.createElement('div');
    chip.className = 'panel-chip';
    chip.textContent = `Panel ${i + 1}`;
    chip.dataset.node = pid;
    chip.addEventListener('click', () => showBuilderFor(tabId, pid));
    wrap.appendChild(chip);
  });
}

// ═══════════════════════════════════════════════════════════════
// Gather a plot payload (single node) — shared by single-plot Run and
// each panel of a grid figure
// ═══════════════════════════════════════════════════════════════
function gatherPlotPayload(id) {
  const st = getState(id);
  const pt = G.plotTypes[st.plotType] || {};
  const extra = {};
  for (const key of Object.keys(pt.defaults || {})) {
    const inp = document.getElementById(`extra-${id}-${key}`);
    if (inp) extra[key] = isNaN(inp.value) ? inp.value : Number(inp.value);
  }
  const config = {
    title:       tabEl(id,'chart-title')?.value || '',
    x:           tabEl(id,'x-col')?.value || '',
    y:           st.yCols,
    group:       st.groupCols,
    marker_by:   tabEl(id,'marker-by')?.value || '',
    dash_by:     tabEl(id,'dash-by')?.value || '',
    z:           tabEl(id,'z-col')?.value || '',
    x_label:     tabEl(id,'x-label')?.value || '',
    y_label:     tabEl(id,'y-label')?.value || '',
    x_scale:     tabEl(id,'x-scale')?.value || 'linear',
    y_scale:     tabEl(id,'y-scale')?.value || 'linear',
    x_tickformat:tabEl(id,'x-tickfmt')?.value || '',
    y_tickformat:tabEl(id,'y-tickfmt')?.value || '',
    ...extra,
  };
  return {
    database: currentDb(id),
    sql: tabEl(id,'sql-input')?.value.trim() || '',
    plot_type: st.plotType,
    config,
    custom_script: tabEl(id,'script')?.value || '',
    transform_script: tabEl(id,'transform')?.value || '',
    layout_script: tabEl(id,'layout-script')?.value || '',
  };
}

// ═══════════════════════════════════════════════════════════════
// Run (single plot or subplot grid)
// ═══════════════════════════════════════════════════════════════
async function runPlot() {
  const tab = activeTabObj();
  if (!tab) return;
  if (tab.state.mode === 'grid') return runGridPlot(tab.id);

  const tabId = tab.id;
  const payload = gatherPlotPayload(tabId);
  if (!payload.database || !payload.sql) { setStatus(tabId,'Set a database and SQL query first','err'); return; }

  setStatus(tabId,'Running…','');
  document.getElementById('btn-run').disabled = true;
  try {
    const res = await api('POST','/api/plot', payload);
    document.getElementById('btn-run').disabled = false;
    addLogEntries(res.log_entries);
    if (res.error) { setStatus(tabId, res.error, 'err'); clientLog(res.error,'error'); return; }
    if (res.columns?.length) updateAxisControls(tabId, res.columns);

    document.getElementById(`overlay-${tabId}`).style.display = 'none';
    Plotly.react(`plot-${tabId}`, res.traces, res.layout, {responsive:true, displaylogo:false, modeBarButtonsToRemove:['sendDataToCloud']});
    tab.state.plotted = true;
    const hint = res.truncated ? ' (truncated to 10k rows)' : '';
    setStatus(tabId, `OK — ${res.traces.length} trace(s), ${res.columns?.length||0} column(s)${hint}`, 'ok');
    clientLog(`Plot rendered: "${tab.label}" — ${res.traces.length} trace(s)${hint}`);
    renderDataTable(document.getElementById(`preview-${tabId}`), res.preview);
  } catch(e) {
    document.getElementById('btn-run').disabled = false;
    setStatus(tabId, e.message, 'err');
    clientLog(e.message, 'error');
  }
}

async function runGridPlot(tabId) {
  const tab = G.tabs.find(t => t.id === tabId);
  const grid = tab.state.grid;
  if (!grid || !grid.panelIds.length) { setStatus(tabId,'Configure the grid first','err'); return; }

  const panels = grid.panelIds.map(pid => gatherPlotPayload(pid));
  const missing = panels.findIndex(p => !p.database || !p.sql);
  if (missing !== -1) { setStatus(tabId, `Panel ${missing+1}: set a database and SQL query`, 'err'); return; }

  setStatus(tabId,'Running…','');
  document.getElementById('btn-run').disabled = true;
  try {
    const res = await api('POST', '/api/plot_grid', {rows: grid.rows, cols: grid.cols, panels});
    document.getElementById('btn-run').disabled = false;
    addLogEntries(res.log_entries);
    if (res.error) { setStatus(tabId, res.error, 'err'); clientLog(res.error, 'error'); return; }

    document.getElementById(`overlay-${tabId}`).style.display = 'none';
    Plotly.react(`plot-${tabId}`, res.traces, res.layout, {responsive:true, displaylogo:false, modeBarButtonsToRemove:['sendDataToCloud']});
    tab.state.plotted = true;
    setStatus(tabId, `OK — ${panels.length} panel(s), ${res.traces.length} trace(s) total`, 'ok');
    clientLog(`Grid figure rendered: "${tab.label}" — ${panels.length} panel(s)`);

    const labeled = (res.previews || []).map((df, i) => ({label: `Panel ${i+1}`, df}));
    renderMultiPreview(document.getElementById(`preview-${tabId}`), labeled);
  } catch (e) {
    document.getElementById('btn-run').disabled = false;
    setStatus(tabId, e.message, 'err');
    clientLog(e.message, 'error');
  }
}

function setStatus(tabId, msg, level) {
  const el = document.getElementById(`status-${tabId}`);
  if (!el) return;
  el.textContent = msg;
  el.className = level==='err' ? 's-err' : level==='warn' ? 's-warn' : 's-ok';
}

// ═══════════════════════════════════════════════════════════════
// Config import / export — schema v3, only meaningful fields kept
// ═══════════════════════════════════════════════════════════════
function isEmptyVal(v) {
  return v === '' || v === null || v === undefined ||
    (Array.isArray(v) && v.length === 0) ||
    (typeof v === 'object' && !Array.isArray(v) && Object.keys(v).length === 0);
}
function pruneConfig(obj, alwaysKeep) {
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    if (alwaysKeep.includes(k)) { out[k] = v; continue; }
    if (isEmptyVal(v)) continue;
    out[k] = v;
  }
  return out;
}

function getNodeConfig(id) {
  const st = getState(id);
  if (!st) return null;
  const pt = G.plotTypes[st.plotType] || {};
  const extra = {};
  for (const [key, defVal] of Object.entries(pt.defaults || {})) {
    const inp = document.getElementById(`extra-${id}-${key}`);
    if (!inp) continue;
    const val = isNaN(inp.value) ? inp.value : Number(inp.value);
    if (String(val) !== String(defVal)) extra[key] = val; // only non-default values
  }
  const raw = {
    database:    currentDb(id) || '',
    sql:         tabEl(id,'sql-input')?.value || '',
    plotType:    st.plotType,
    chartTitle:  tabEl(id,'chart-title')?.value || '',
    x:           tabEl(id,'x-col')?.value || '',
    y:           st.yCols,
    group:       st.groupCols,
    markerBy:    tabEl(id,'marker-by')?.value || '',
    dashBy:      tabEl(id,'dash-by')?.value || '',
    z:           tabEl(id,'z-col')?.value || '',
    xLabel:      tabEl(id,'x-label')?.value || '',
    yLabel:      tabEl(id,'y-label')?.value || '',
    xScale:      (tabEl(id,'x-scale')?.value || 'linear') === 'linear' ? '' : tabEl(id,'x-scale').value,
    yScale:      (tabEl(id,'y-scale')?.value || 'linear') === 'linear' ? '' : tabEl(id,'y-scale').value,
    xTickFmt:    tabEl(id,'x-tickfmt')?.value || '',
    yTickFmt:    tabEl(id,'y-tickfmt')?.value || '',
    extra,
    customScript:    tabEl(id,'script')?.value || '',
    transformScript: tabEl(id,'transform')?.value || '',
    layoutScript:    tabEl(id,'layout-script')?.value || '',
  };
  return pruneConfig(raw, ['database','sql','plotType']);
}

function applyNodeConfig(id, cfg) {
  const st = getState(id);
  if (!st || !cfg) return;
  const f = (sid, val) => { const el = tabEl(id, sid); if (el && val !== undefined) el.value = val; };
  f('db-select',  cfg.database);
  f('sql-input',  cfg.sql);
  f('chart-title',cfg.chartTitle || '');
  f('x-label',    cfg.xLabel || '');
  f('y-label',    cfg.yLabel || '');
  f('x-scale',    cfg.xScale || 'linear');
  f('y-scale',    cfg.yScale || 'linear');
  f('x-tickfmt',  cfg.xTickFmt || '');
  f('y-tickfmt',  cfg.yTickFmt || '');
  f('script',     cfg.customScript || '');
  f('transform',  cfg.transformScript || '');
  f('layout-script', cfg.layoutScript || '');

  st.database = cfg.database || st.database;
  st.plotType = cfg.plotType || 'line';
  st.yCols    = cfg.y || [];
  st.groupCols= cfg.group || [];
  st.extra    = cfg.extra || {};
  st.customScript = cfg.customScript || '';
  st.transformScript = cfg.transformScript || '';
  st.layoutScript = cfg.layoutScript || '';

  renderPlotChips(id);
  renderExtraOpts(id);
  for (const [key, val] of Object.entries(cfg.extra || {})) {
    const inp = document.getElementById(`extra-${id}-${key}`);
    if (inp) inp.value = val;
  }
  setTimeout(() => { f('marker-by', cfg.markerBy || ''); f('dash-by', cfg.dashBy || ''); }, 0);

  // Columns aren't persisted (derived data) — re-run the query automatically
  // if we have SQL, so the axis dropdowns populate themselves.
  if (cfg.sql && cfg.sql.trim()) {
    setTimeout(() => runShow(id).then(() => {
      setTimeout(() => { f('x-col', cfg.x || ''); }, 0);
    }), 0);
  }
}

function getTabConfig(tabId) {
  const tab = G.tabs.find(t => t.id === tabId);
  if (!tab) return null;
  const cfg = { version: 3, label: tab.label, mode: tab.state.mode || 'single' };
  if (tab.state.mode === 'grid' && tab.state.grid) {
    cfg.grid = {
      rows: tab.state.grid.rows, cols: tab.state.grid.cols,
      panels: tab.state.grid.panelIds.map(pid => getNodeConfig(pid)),
    };
  } else {
    Object.assign(cfg, getNodeConfig(tabId));
  }
  return cfg;
}

function applyTabConfig(tabId, cfg) {
  if (!cfg || cfg.version < 2) { alert('Invalid or incompatible config (expected version 2 or later).'); return; }
  const tab = G.tabs.find(t => t.id === tabId);
  if (!tab) return;
  tab.label = cfg.label || tab.label;
  const lbl = document.querySelector(`#tabbtn-${tabId} .tab-label`);
  if (lbl) lbl.textContent = tab.label;

  if (cfg.grid) {
    const radios = document.getElementsByName(`mode-${tabId}`);
    radios.forEach(r => { r.checked = (r.value === 'grid'); });
    setFigureMode(tabId, 'grid');
    document.getElementById(`grid-rows-${tabId}`).value = cfg.grid.rows;
    document.getElementById(`grid-cols-${tabId}`).value = cfg.grid.cols;
    applyGrid(tabId);
    tab.state.grid.panelIds.forEach((pid, i) => {
      if (cfg.grid.panels[i]) applyNodeConfig(pid, cfg.grid.panels[i]);
    });
  } else {
    const radios = document.getElementsByName(`mode-${tabId}`);
    radios.forEach(r => { r.checked = (r.value === 'single'); });
    setFigureMode(tabId, 'single');
    applyNodeConfig(tabId, cfg);
  }
  setStatus(tabId,'Config loaded — click Run to render','warn');
  clientLog(`Config imported into tab "${tab.label}"`);
}

document.getElementById('btn-export-config').addEventListener('click', () => {
  const cfg = getTabConfig(G.activeTab);
  if (!cfg) return;
  download(JSON.stringify(cfg, null, 2), `plot-config-${cfg.label.replace(/\s+/g,'-')}.json`);
  clientLog(`Config exported for tab "${cfg.label}"`);
});
document.getElementById('btn-import-config').addEventListener('click', () => document.getElementById('import-file-input').click());
document.getElementById('import-file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  readJson(f, cfg => applyTabConfig(G.activeTab, cfg));
  e.target.value = '';
});

document.getElementById('btn-export-all').addEventListener('click', () => {
  const ws = { version: 3, tabs: G.tabs.map(t => getTabConfig(t.id)) };
  download(JSON.stringify(ws, null, 2), `workspace-${Date.now()}.json`);
  clientLog(`Workspace exported: ${G.tabs.length} tab(s). Save it as plots.json in the server's working directory to auto-load it next launch.`);
});
document.getElementById('btn-import-all').addEventListener('click', () => document.getElementById('import-ws-file-input').click());
document.getElementById('import-ws-file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  readJson(f, ws => applyWorkspace(ws, 'imported'));
  e.target.value = '';
});

function applyWorkspace(ws, sourceLabel) {
  if (!ws?.tabs?.length) { alert('Invalid workspace file.'); return; }
  [...G.tabs].forEach(t => closeTab(t.id));
  G.tabs = [];
  document.querySelectorAll('.plot-tab').forEach(el => el.remove());
  document.querySelectorAll('.workspace').forEach(el => el.remove());
  ws.tabs.forEach(cfg => {
    const newId = createTab(cfg.label || `Plot ${G.nextTabId}`, {});
    applyTabConfig(newId, cfg);
  });
  clientLog(`Workspace ${sourceLabel}: ${ws.tabs.length} tab(s)`);
}

document.getElementById('btn-export-png').addEventListener('click', () => {
  const tab = activeTabObj();
  if (!tab?.state?.plotted) { clientLog('No plot rendered yet','warn'); return; }
  Plotly.downloadImage(`plot-${G.activeTab}`, {format:'png', width:1600, height:900, filename:`hpc-plot-${tab.label.replace(/\s+/g,'-')}`});
  clientLog(`PNG saved for tab "${tab.label}"`);
});

// ═══════════════════════════════════════════════════════════════
// Actions sidebar — re-parse
// ═══════════════════════════════════════════════════════════════
function populateReparseSel() {
  const wrap = document.getElementById('reparse-db-wrap');
  const sel = document.getElementById('reparse-db-sel');
  sel.innerHTML = Object.keys(G.databases).map(n => `<option value="${n}">${n}</option>`).join('');
  if (G.singleDb) { wrap.style.display = 'none'; sel.value = G.defaultDb; }
  else { wrap.style.display = 'block'; }
}

document.getElementById('btn-reparse').addEventListener('click', async () => {
  const db = G.singleDb ? G.defaultDb : document.getElementById('reparse-db-sel').value;
  if (!db) return;
  clientLog(`Re-parsing database "${db}"…`);
  document.getElementById('reparse-result').textContent = 'Running…';
  const res = await api('POST', '/api/reparse', {database: db});
  document.getElementById('reparse-result').textContent = res.message || res.error;
  if (res.databases) {
    G.databases = res.databases;
    G.singleDb = !!res.single_db;
    G.defaultDb = res.default_database || '';
    renderSchemaTree(); populateReparseSel(); populateAllDbSelects();
    // Refresh every open tab/panel bound to this DB so newly added columns
    // actually show up (this used to require a server restart).
    const affectedIds = [
      ...G.tabs.filter(t => t.state.database === db).map(t => t.id),
      ...Object.keys(G.panelState).filter(pid => G.panelState[pid].database === db),
    ];
    for (const id of affectedIds) {
      const sqlVal = tabEl(id, 'sql-input')?.value.trim();
      if (sqlVal) await runShow(id);
    }
    if (affectedIds.length) clientLog(`Refreshed columns for ${affectedIds.length} open panel(s) bound to "${db}"`);
  }
  if (res.log_entry) addLogEntry(res.log_entry);
});

// ═══════════════════════════════════════════════════════════════
// Actions sidebar — remote fetch
// ═══════════════════════════════════════════════════════════════
function populateFetchSystems() {
  const sel = document.getElementById('fetch-system-sel');
  sel.innerHTML = '<option value="">— select system —</option>' +
    Object.keys(G.remoteSystems).map(s => `<option value="${s}">${s}</option>`).join('');
}
function onFetchSystemChange() {
  const sys = document.getElementById('fetch-system-sel').value;
  const paths = G.remoteSystems[sys] || [];
  const list = document.getElementById('fetch-path-list');
  if (!paths.length) { list.innerHTML = '<span style="color:var(--text3);font-size:9px">No paths configured</span>'; return; }
  list.innerHTML = paths.map(p =>
    `<label class="fetch-path-item"><input type="checkbox" value="${escHtml(p)}"> <span>${escHtml(p)}</span></label>`
  ).join('');
}
async function runFetch() {
  const sys = document.getElementById('fetch-system-sel').value;
  if (!sys) { clientLog('Select a remote system first', 'warn'); return; }
  const checked = [...document.querySelectorAll('#fetch-path-list input:checked')].map(i => i.value);
  if (!checked.length) { clientLog('No paths selected', 'warn'); return; }
  clientLog(`Fetching ${checked.length} path(s) from "${sys}"…`);
  document.getElementById('fetch-result').textContent = 'Running…';
  const res = await api('POST', '/api/fetch_remote', {system: sys, paths: checked});
  document.getElementById('fetch-result').textContent = res.message || res.error;
  if (res.databases) {
    G.databases = res.databases;
    G.singleDb = !!res.single_db;
    G.defaultDb = res.default_database || '';
    renderSchemaTree(); populateReparseSel(); populateAllDbSelects();
  }
  if (res.log_entry) addLogEntry(res.log_entry);
}
function populateAllDbSelects() {
  const opts = Object.keys(G.databases).map(n => `<option value="${n}">${n}</option>`).join('');
  const allIds = [...G.tabs.map(t => t.id), ...Object.keys(G.panelState)];
  allIds.forEach(id => {
    const sel = tabEl(id, 'db-select');
    if (sel) { const prev = sel.value; sel.innerHTML = opts; if (prev) sel.value = prev; }
    const dbWrap = document.getElementById(`db-select-wrap-${id}`);
    if (dbWrap) dbWrap.style.display = G.singleDb ? 'none' : 'block';
  });
}

// ═══════════════════════════════════════════════════════════════
// Actions sidebar — plugins
// ═══════════════════════════════════════════════════════════════
document.getElementById('btn-reload-plugins').addEventListener('click', async () => {
  clientLog('Reloading plugins…');
  const res = await api('POST', '/api/reload_plugins', {dirs:[]});
  if (res.error) { clientLog(res.error,'error'); return; }
  Object.assign(G.plotTypes, res.plot_types || {});
  const allIds = [...G.tabs.map(t => t.id), ...Object.keys(G.panelState)];
  allIds.forEach(id => { renderPlotChips(id); renderExtraOpts(id); });
  document.getElementById('plugin-list').textContent = res.reloaded.length ? res.reloaded.join(', ') : 'No plugins found';
  if (res.log_entry) addLogEntry(res.log_entry);
});

// ═══════════════════════════════════════════════════════════════
// Sidebar tabs
// ═══════════════════════════════════════════════════════════════
document.querySelectorAll('.sb-tab').forEach(t => t.addEventListener('click', () => {
  const name = t.dataset.sbtab;
  document.querySelectorAll('.sb-tab').forEach(x => x.classList.toggle('active', x.dataset.sbtab === name));
  document.querySelectorAll('.sb-pane').forEach(p => p.classList.toggle('active', p.id === `sbtab-${name}`));
}));

// ═══════════════════════════════════════════════════════════════
// Topbar run + keyboard
// ═══════════════════════════════════════════════════════════════
document.getElementById('btn-run').addEventListener('click', runPlot);
document.addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runPlot(); } });

// ═══════════════════════════════════════════════════════════════
// Utility
// ═══════════════════════════════════════════════════════════════
function download(text, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type:'application/json'}));
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}
function readJson(file, cb) {
  const r = new FileReader();
  r.onload = ev => { try { cb(JSON.parse(ev.target.result)); } catch(e) { alert('Could not parse JSON: '+e.message); } };
  r.readAsText(file);
}

// ═══════════════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════════════
async function init() {
  const [dbRes, ptRes, rsRes, wsRes] = await Promise.all([
    api('GET', '/api/databases'),
    api('GET', '/api/plot_types'),
    api('GET', '/api/remote_systems'),
    api('GET', '/api/initial_workspace'),
  ]);
  G.databases     = dbRes.databases    || {};
  G.singleDb      = !!dbRes.single_db;
  G.defaultDb     = dbRes.default_database || '';
  G.plotTypes     = ptRes.plot_types   || {};
  G.remoteSystems = rsRes.systems      || {};

  renderSchemaTree();
  populateReparseSel();
  populateFetchSystems();

  if (wsRes.workspace?.tabs?.length) {
    applyWorkspace(wsRes.workspace, 'auto-loaded from plots.json');
  } else {
    createTab('Plot 1');
  }

  await fetchServerLogs();
  clientLog('Application ready');
}

init();
</script>
